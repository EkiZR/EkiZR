<svg fill="none" viewBox="0 0 800 420" width="100%" height="420" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width: 100%; height: 100%; padding: 40px; box-sizing: border-box; display: flex; justify-content: center; align-items: center;">
      
      <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&amp;display=swap');

        .window {
          width: 100%;
          max-width: 700px;
          border-radius: 16px;
          background: linear-gradient(135deg, rgba(7,27,20,0.95) 0%, rgba(3,15,12,1) 58%, rgba(4,26,30,0.95) 100%);
          border: 1px solid rgba(16,185,129,0.3);
          /* Shadow sekarang punya ruang buat nge-blur */
          box-shadow: 0 15px 35px rgba(0,0,0,0.5), 0 0 0 1px rgba(6,182,212,0.1), 0 0 30px rgba(16,185,129,0.15), inset 0 0 20px rgba(16,185,129,0.05);
          font-family: 'JetBrains Mono', monospace;
          overflow: hidden;
          position: relative;
        }

        .scanline {
          position: absolute;
          inset: 0;
          background: linear-gradient(to bottom, transparent, rgba(6,182,212,0.1), transparent);
          opacity: 0;
          animation: scan 4s ease-in-out infinite;
          pointer-events: none;
          z-index: 10;
        }

        @keyframes scan {
          0% { transform: translateY(-100%); opacity: 0; }
          20% { opacity: 0.5; }
          80% { opacity: 0.2; }
          100% { transform: translateY(100%); opacity: 0; }
        }

        .header {
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 12px 16px;
          border-bottom: 1px solid rgba(16,185,129,0.15);
          background: rgba(2,12,9,0.6);
        }

        .dots { display: flex; gap: 6px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot.red { background: #ff5f57; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #28c840; }

        .title { font-size: 11px; color: rgba(163,230,211,0.5); letter-spacing: 0.22em; }

        .status { display: flex; align-items: center; gap: 6px; font-size: 10px; color: rgba(16,185,129,0.6); }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #10b981; box-shadow: 0 0 10px rgba(16,185,129,0.8); animation: pulse 2s infinite; }

        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        .body { padding: 24px; display: flex; font-size: 13px; line-height: 1.8; position: relative; }
        .gutter { display: flex; flex-direction: column; align-items: flex-end; padding-right: 16px; color: #2d4a3e; user-select: none; }
        .code { display: flex; flex-direction: column; }
        
        .line { opacity: 0; transform: translateX(-10px); animation: reveal 0.4s ease forwards; white-space: pre; }
        @keyframes reveal { to { opacity: 1; transform: translateX(0); } }

        .l1 { animation-delay: 0.4s; } .l2 { animation-delay: 0.8s; } .l3 { animation-delay: 1.2s; }
        .l4 { animation-delay: 1.6s; } .l5 { animation-delay: 2.0s; } .l6 { animation-delay: 2.4s; }
        .l7 { animation-delay: 2.8s; } .l8 { animation-delay: 3.2s; } .l9 { animation-delay: 3.6s; }
        .l10 { animation-delay: 4.0s; }

        .cursor { display: inline-block; width: 8px; height: 15px; background-color: #10b981; vertical-align: middle; margin-left: 4px; opacity: 0; animation: blink 1s step-end infinite; animation-delay: 4.4s; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .footer { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; border-top: 1px solid rgba(16,185,129,0.15); background: rgba(16,185,129,0.09); color: #4b5563; font-size: 11px; }
      </style>

      <div class="window">
        <div class="scanline"></div>
        
        <div class="header">
          <div class="dots">
            <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
          </div>
          <div class="title">developer.js</div>
          <div class="status"><div class="status-dot"></div>status</div>
        </div>

        <div class="body">
          <div class="gutter">
            <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10</span>
          </div>
          
          <div class="code">
            <div class="line l1" style="color: #e2e8f0;">const developer = {</div>
            <div class="line l2" style="color: #a3e6d3;">  name: "Eki Zulfar Rachman",</div>
            <div class="line l3" style="color: #a3e6d3;">  role: "Frontend Developer",</div>
            <div class="line l4" style="color: #a3e6d3;">  stack: ["React", "Node.js", "JavaScript"],</div>
            <div class="line l5" style="color: #93c5fd;">  principle: "Leveraging AI as a professional tool, not a replacement.",</div>
            <div class="line l6" style="color: #f59e0b;">  focus: "building engaging websites",</div>
            <div class="line l7" style="color: #e2e8f0;">  build: () =&gt; {</div>
            <div class="line l8" style="color: #c084fc;">    return "interactive digital experiences";</div>
            <div class="line l9" style="color: #e2e8f0;">  }</div>
            <div class="line l10" style="color: #e2e8f0;">}<span class="cursor"></span></div>
          </div>
        </div>

        <div class="footer">
          <div style="display: flex; gap: 12px;"><span style="color: #10b981;">⎇ main</span><span>Ln 10, Col 2</span></div>
          <div style="display: flex; gap: 12px;"><span style="color: #10b981;">● Live</span><span>JavaScript</span></div>
        </div>
      </div>

    </div>
  </foreignObject>
</svg>
